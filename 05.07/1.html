<!DOCTYPE html>
<html lang="ko">
<head>
    <style>
        .slider { position: relative; width: 300px; height: 200px; overflow: hidden; }
        .slide { 
            position: absolute; inset: 0; opacity: 0; transition: 1s; 
            display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;
        }
        .slide.active { opacity: 1; } /* active가 붙은 슬라이드만 보임 */
        .s1 { background: #3D1F8F; } .s2 { background: #FF6B2B; } .s3 { background: #222; }
    </style>
</head>
<body>
    <div class="slider">
        <div class="slide s1 active">SLIDE 1</div>
        <div class="slide s2">SLIDE 2</div>
        <div class="slide s3">SLIDE 3</div>
    </div>

    <script>
        // const slides = document.querySelectorAll(".slide");
        // let current = 0;

        // //자동타이머
        // setInterval(() => {
        //     //현재 슬라이드에서 active제거
        //     slides[current].classList.remove("active");
        //     //다음 인덱스 계산 (0 -> 1 -> 2 -> 0)
        //     current = (current + 1) % slides.length;
        // //   (0+1)/3 = 1, (1+1)/3 = 2 (2+1)/3 = 0

        //     //다음 슬라이드에 active 추가
        //     slides[current].classList.add("active");
        //     },3000);
//============================================================================            
            const slides = document.querySelectorAll(".slide");
            let current = 0;

            setInterval(() => {
                slides[current].classList.remove("active");
                current = (current + 1) % slides.length;
                slides[current].classList.add("active");
            },3000);
    </script>
</body>
</html>
