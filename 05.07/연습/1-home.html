<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .slider{
            position: relative;
            width: 300px;
            height: 200px;
            overflow: hidden;
            margin: 50px auto;
        }
        .slide{
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: 1s;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffff;
            font-weight: bold;
        }
        .slide.active{
            opacity: 1;
        }
        .s1{
            background: #3D1F8F;
        }
        .s2{
            background: #FF6B2B;
        }
        .s3{
            background: #222;
        }
    </style>
</head>
<body>
    <div class="slider">
        <div class="slide s1 active" >SLIDE 1</div>
        <div class="slide s2" >SLIDE 2</div>
        <div class="slide s3" >SLIDE 3</div>
    </div>

    <script>
        // const slides = document.querySelectorAll(".slide");
        // let current = 0;

        // setInterval(() => {
        //     slides[current].classList.remove("active");
        //     current = (current + 1) % slides.length;
        //     slides[current].classList.add("active");
        // },3000);

        const slides = document.querySelectorAll(".slide");
        let current = 0;

        setInterval(()=> {
            slides[current].classList.remove("active");
            current = (current + 1) % slides.length;
            slides[current].classList.add("active");
        },3000);
    </script>
</body>
</html>
