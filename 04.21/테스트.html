<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테스트</title>
</head>
<body>
    <h1>입력창😊</h1>
    <p class="info">글자 입력 상자색 바뀜</p>
    <input type="text" id="magic-input" placeholder="글자 쓰세요">
    <div id="box">준비중...</div>

    <script>
        function changeBox(len) {
            const box = document.querySelector("#box");

            if(len >= 10) {
                box.style.backgroundColor = "skybule";
            } else if(len >= 5) {
                box.style.backgroundColor = "pink";
            }
        }

        document.querySelector("input").addEventListener("input", (e)=> {
            const lengh = e.target.value.lengh;

            changeBox(length);

            if(lengh === 0) {
                setTimeout( () => {
                    document.querySelector("box").style.backgroundColor = "white";
                },2000);
            }
        });
    </script>

    dom요소 선택
    선언적 함수-> 글자 수에 따라 ui변경
    이벤트리스너 -> input이벤트:글자가 입력될때마다 실행
    타이머 처리
</body>
</html>
