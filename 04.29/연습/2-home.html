<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .tab-container{
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-button{
            padding: 10px 20px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: #fff;
            transition: 0.3s;
        }
        .tab-button.active{
            background: #007bff;
            color: #fff;
            border-color: #007bff;
        }
        .display-area{
            padding: 20px;
            border: 1px dashed #aaa;
            background: #f9f9f9;
        }
    </style>
</head>
<body>
    <h3>📂 카테고리 선택(event.target 활용)</h3>
    <div class="tab-container">
        <button class="tab-button active">전체</button>
        <button class="tab-button">디자인</button>
        <button class="tab-button">개발</button>
        <button class="tab-button">마케팅</button>
    </div>

    <div class="display-area">
        현재 선택된 카테고리: <strong id="selected-category">전체</strong>
    </div>

    <script src="script-home2.js"></script>
</body>
</html>
