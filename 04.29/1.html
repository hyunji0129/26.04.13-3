<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1</title>
    <style>
        .banner { background: #333; color: #fff; padding: 10px; display: flex; justify-content: space-between; }
        .cart-item { border-bottom: 1px solid #ddd; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-close { cursor: pointer; background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 3px; }
        .empty-msg { color: #999; font-style: italic; display: none; }
    </style>
</head>
<body>
    <div id="top-banner" class="banner">
        <span>지금 가입하면 50% 할인 쿠폰 증정! 🎫</span>
        <button class="btn-close" onclick="removeBanner()">닫기</button>
    </div>

    <h3>🛒 내 장바구니</h3>
    <ul id="cart-list">
        <li class="cart-item">
            <span>맥북 프로 14인치</span>
            <button class="btn-delete">삭제</button>
        </li>
        <li class="cart-item">
            <span>로지텍 MX Master 3</span>
            <button class="btn-delete">삭제</button>
        </li>
    </ul>
    <p id="empty-cart" class="empty-msg">장바구니가 비어 있습니다.</p>

    <script src="script1.js"></script>

    
</body>
</html>
