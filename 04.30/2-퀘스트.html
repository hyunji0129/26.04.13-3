<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
</head>
<body>

<h1>삭제 대상</h1>
<button id="btn">삭제하기</button>

<script>
const btn = document.querySelector('#btn');

btn.addEventListener('click', () => {

  const h1 = document.querySelector('h1');

  if (h1) {
    h1.remove();
  }

});
</script>

</body>
</html>
