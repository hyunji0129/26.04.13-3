<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>퀘스트1</title>
</head>
<body>

<h1>3초 뒤 사라질 제목</h1>

<script>
document.addEventListener('DOMContentLoaded', () => {

  setTimeout(() => {
    const h1 = document.querySelector('h1');

    if (h1) {
      h1.remove();
    }

  }, 3000);

});
</script>

</body>
</html>
