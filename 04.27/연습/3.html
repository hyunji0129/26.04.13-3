<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const notic = [
            "시스템 점검 안내",
            "신규 기능 업데이트",
            "이벤트 당첨자 발표",
            "개인정보 처리방침 개정",
            "설문조사 참여 요청"
        ];

        console.log("---최근 공지 사항---");
        for(let i = notic.length -1; i >= 0; i--){
            console.log(`[공지] ${notic[notic.length -1 -i]}`);
        };
        
    </script>
</body>
</html>
