<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연습</title>
    <style>
        body{
            font-family: sans-serif;
            margin-top: 50px;
            text-align: center;
        }

        button{
            padding: 10px 20px;
            font-size: 16px;
        }

        #box{
            width: 300px;
            height: 100px;
            margin: 20px auto;
            border: 2px solid #ccc;
            border-radius: 10px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loading{
            background: skyblue;
            color: #333;
        }

        .done{
            background: pink;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>결제 시스템🎀</h1>
    <button id="pay-btn">결제하기</button>
    <div id="box">대기중...</div>

    <script>
        const btn = document.querySelector("#pay-btn");
        const box = document.querySelector("#box");

        function onComplete() {
            box.textContent = "결제 완료!"
            box.className = "done";
        }

        function process(callback) {
            box.textContent = "결제 처리중";
            box.className = "loading";

            setTimeout(() => {
                callback();
            },2000);
        };

        btn.addEventListener("click", () =>{
            process(onComplete);
        });
    </script>
</body>
</html>
