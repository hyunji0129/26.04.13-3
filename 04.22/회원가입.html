<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <style>
        /* 구글폰트 가져오기 */

        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body{
            font-family: sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card{
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            width: 420px;
            box-shadow: 0 4px 24px #00000057;
        }

        h1{
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #111;
        }
        .subtitle{
            font-size: 13px;
            color: #888;
            margin-bottom: 32px;
        }

        .field{
            margin-bottom: 20px;
        }

        label{
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #888;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus{
            border-color: rgb(22, 22, 173);
        }
        input.invalid{
            border-color: rgb(201, 71, 71);
            background: #aaa;
        }
        input.valid{
            border-color: rgb(63, 223, 63);
            background: #aaa;
        }

        .msg{
            font-size: 12px;
            margin-top: 5px;
            min-height: 16px;
            transition: color 0.2s;
        }

        .msg.error{
            color: red;
        }
        .msg.success{
            color: green;
        }
        .msg.info{
            color: gray;
        }

        .strength-wrap{
            margin-top: 8px;
            display: flex;
            gap: 5px;
        }

        .strength-bar{
            height: 4px;
            flex: 1;
            border-radius: 99px;
            background: #eee;
            transition: background 0.3s;
        }

        .btn-join{
            width: 100%;
            padding: 13px;
            background: rgb(22, 22, 173);
            color: #fff;
            border: none;
            font-size: 15px;
            border-radius: 8px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s transform 0.1s;
        }
        .btn-join:hover{
            background:  rgb(94, 94, 218);
        }
        .btn-join:active{
            transform: scale(0.98);
        }
        .btn-join:disabled{
            background: #c5cee0;
            cursor: not-allowed;
            transform: none;
        }
        .toast{
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #111;
            color: #fff;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
        }
        .toast.show{
            opacity: 1;
            transform: translateX(-50%), translateY(0);
        }

    </style>
</head>
<body>
    <div class="card">
        <h1>회원가입</h1>
        <p class="subtitle">필수 정보를 입력 후 가입을 완료하세요</p>

        <div class="field">
            <label for="uid">아이디<span style="color: #aaa; font-weight: 400;">(4자 이상, 영숫자)</span></label>
            <input type="text" id="uid" placeholder="아이디 입력">
            <div id="uid-msg" class="msg info"></div>
        </div>

        <div class="field">
            <label for="pw">비밀번호<span style="color: #aaa; font-weight: 400;">(6자 이상)</span></label>
            <input type="password" id="pw" placeholder="비번 입력">
            <div class="strength-wrap">
                <div class="strength-bar" id="s1"></div>
                <div class="strength-bar" id="s2"></div>
                <div class="strength-bar" id="s3"></div>
            </div>
        </div>
        <div id="pw-msg" class="msg info"></div>
    
        <div class="field">
            <label for="pw2">비번확인</label>
            <input type="password" id="pw2" placeholder="비번 재입력">
            <div id="pw2-msg" class="msg info"></div>
        </div>
        <button class="btn-join" id="join-btn" disabled>가입신청</button>
    </div>    
    <div id="toast" class="toast">가입신청완료🧡</div> 
    
    <script>
        function validateId(val) {
            if ( val.length === 0) return {ok: null, msg:""};
            if ( val.length < 4)return {ok: false, msg: "4자 이상 입력하세요"};
            if (!/^[a-zA-Z0-9]+$/.test(value)) return {ok: false, msg: "영문과 숫자만 사용 가능합니다."};
            return {ok: true, msg: "사용 가능한 아이디예요"};
        }

        function validatePw(val){
            if (val.length === 0) return{ ok: null, msg:"", level: 0};
            if (val.length < 6) return { ok: false, msg:"6자 이상 입력하세요", level: 1};

            let level = 1;
            if (/[0-9]/.test(val)) level++;
            if (/[!@#$%^&*]/.test(val)) level++;
        }

        function validatePw2(p1, p2) {
            if (p2.length === 0) return{ ok: null, msg:""};
            if (p1 !== p2) return{ ok:false, msg: "비밀번호 일치하지 않습니다."}
            return { ok: true, msg: "비밀번호 맞아요!"}
        }

        //화면 업데이트 로직, 검증결과 반영
        function updateUI(inputEl, msgEl, res) {
            //초기화
            if (res.ok === null) {
                inputEl.className = "";
                msgEl.className = "msg info";
                msgEl.textContent ="";
                return;
            }
        }

        //상태에 따른 클래스,메세지
        inputEl.className = res.ok ? "valid" : "invalid";
        msgEl.className = res.ok ? "msg success": "msg error"; 
        msgEl.textContent = res.msg;

        //강도바 색상 변경
        function updateStrengthBar(level){
            const color = ["#eee","pink","skyblue","blue"];
            const bars = [document.querySelector("#s1"),document.querySelector("#s2"),document.querySelector("#s3")];
            bars.forEach((bar, i) => {
                bar.style.background = i < level ? color[level] : "#eee";
            });
        }
        

        //전체 유효성 체크 및 버튼 제어
        function checkAll() {
            const idVal = document.querySelector("#uid").value;
            const pwVal = document.querySelector("#pw").value;
            const pw2Val = document.querySelector("#pw2").value;

            const isAllOk = validateId(idVal).ok && validatePw(pwVal).ok && validatePw2(pwVal, pw2Val).ok;
            document.querySelector("#join-btn").disabled = !isAllOk;
        }

        //사용자 이벤트 바인딩(event Listeners)

        //아이디 입력
        document.querySelector("#uid").addEventListener("input", (e) => {
            const res = validateId(e.target.value);
            updateUI(document.querySelector("#uid"), document.querySelector("#uid-msg"), res);
            checkAll();
        });

        //비밀번호
        document.querySelector("#pw").addEventListener("input", (e) => {
            const res = validatePw(e.target.value);
            updateUI(document.querySelector("#pw"),document.querySelector("#pw-msg"), res);
            updateStrengthBar(res.level);
       
        //비번 바뀔때 확인칸도 동기화해서 검사
        const pw2El = document.querySelector("#pw2");
        const res2 = validatePw2(e.target.value, pw2El.value);
        updateUI(pw2El, document.querySelector("#pw2-msg"), res2);
        checkAll();
        });

        //가입처리
        document.querySelector("#join-btn").addEventListener("click", function(){
            this.disabled = true;
            this.textContent = "처리중..";

            setTimeout(() => {
                const toast = document.querySelector("#toast");
                toast.classList.add("show");

                this.textContent = "가입완료";
                this.style.background = "green"

                setTimeout(() => { 
                    toast.classList.remove("show");
                },3000);
            },1500);
        });
    </script>
</body>
</html>
