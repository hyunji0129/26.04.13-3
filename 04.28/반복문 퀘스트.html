<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // for반복문
        const fruit = ["사과", "바나나", "포도"];

        for (let i = 0; i < fruit.length; i++) {
            console.log(`${i}번째 과일: ${fruit[i]}`);
        }

        // 역순
        const animal = ["강아지", "고양이", "토끼"];

        for (let i = animal.length - 1; i >= 0; i--) {
            console.log(`${i}번째 동물: ${animal[i]}`);
        }

        // 합구하기
        let sum = 0;

        for (let i = 1; i <= 10; i++) {
            sum += i;
        }
        console.log(`1~10까지의 합은 ${sum}이다`);
