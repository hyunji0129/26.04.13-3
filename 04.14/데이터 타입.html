<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터타입</title>
</head>
<body>
    <h1>데이터타입 연습</h1>
    <p>개발자 도구에서 확인</p>

    <script>
        let price = 3000;
        console.log("데이터", typeof price);

        let price1 = "3000";
        console.log("데이터", typeof price1);

        let menu = "아메리카노";
        console.log("데이터", menu, typeof menu);

        let isSoldOut = false;
        console.log("데이터", isSoldOut, typeof isSoldOut);

        let test = 100 + 100;
        console.log(100 + 100, test, typeof test);
    </script>
</body>
</html>
