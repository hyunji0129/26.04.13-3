<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array</title>
</head>
<body>
    
    <script>
        // Array
        const cart = ["아메리카노","라떼","딸기주스"];

        console.log(`첫번째 주문 메뉴: ${cart[0]}`);

        // object
        const product = {
            name: "민트초코",
            price: 4500,
            isSoldOut: false
        };

        console.log(`상품명: ${product.name},가격: ${product.price}원`);

        // Increment/Decrement
        let count = 1;

        count++;
        console.log(`현재수량: ${count}`);
    </script>
</body>
</html>
